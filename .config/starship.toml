[directory]
style = "fg:#d8dee9 bg:#4c566a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#3b4252"
format = '[[ $symbol $branch ](fg:#d8dee9 bg:#3b4252)]($style)'

[git_status]
style = "bg:#3b4252"
format = '[[($all_status$ahead_behind )](fg:#d8dee9 bg:#3b4252)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#2e3440"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#2e3440)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#2e3440"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#2e3440)]($style)'

[golang]
symbol = "Óėß"
style = "bg:#2e3440"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#2e3440)]($style)'

[php]
symbol = "Óėą"
style = "bg:#2e3440"
