"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](#81a1c1)\
[ ůį£á ](bg:#81a1c1 fg:#2e3440)\
[Óāī](bg:#4c566a fg:#81a1c1)\
$directory\
[Óāī](fg:#4c566a bg:#3b4252)\
