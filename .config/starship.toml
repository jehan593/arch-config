[custom.warp]
command = 'cat ~/.config/warp/warp_status'
when = 'test -s ~/.config/warp/warp_status'
shell = "bash"
style = "bg:#3b4252"
format = '[[ $output ](fg:#d08770 bg:#3b4252)]($style)'
description = "WARP status"
